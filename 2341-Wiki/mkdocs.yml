site_name: 2341 Wiki
site_description: 'Internal knowledge base for the 2341 campus store team'
docs_dir: docs/
repo_name: 'rossr2601/2341-Wiki'
repo_url: 'https://github.com/rossr2601/2341-Wiki'
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: cyan
    - scheme: slate
      primary: teal
      accent: cyan
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Opening & Closing Procedures:
      - Overview: docs/Opening and Closing/placeholder.md
  - Scheduling & Timecards:
      - Overview: docs/Scheduling and Timecards/placeholder.md
  - Training & Onboarding:
      - Overview: docs/Training and Onboarding/placeholder.md
  - Customer Support:
      - Overview: docs/Customer Support/placeholder.md
  - Merchandising & Inventory:
      - Overview: docs/Merchandising and Inventory/placeholder.md
  - Events & Sales:
      - Overview: docs/Events and Sales/placeholder.md
  - Store Management:
      - Overview: docs/Store Management/placeholder.md

markdown_extensions:
  - admonition
  - toc
  - def_list
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
